# ============================================================
# Trading Strategy Configuration  (v8 — 2026-06-28)
# 交易策略配置  (v8 — 2026-06-28)
# ============================================================
# v8: RSI 20/80 — Wilder-indicator backtest (3 windows × 12 configs)
# v8: RSI 20/80 — Wilder 指标回测 (3 窗口 × 12 配置)
#   Only config positive across ALL 3 windows: +2.36/+8.92/+1.61 = +12.88 USDT
#   唯一三窗口全正: +2.36/+8.92/+1.61 = +12.88 USDT
#   avgPF 1.18 (v7 was PF 0.61 — all windows negative, -16.70 total)
#   平均 PF 1.18 (v7 是 PF 0.61 — 三窗口全亏, 共 -16.70)
# ----- Trading Pair / 交易对 -----
symbol: BTCUSDT

# ----- Position Sizing / 仓位管理 -----
# v6 — 2026-06-27: balance is ~16 USDT after drawdown.  Use 15 USDT margin
# v6 — 2026-06-27: 回撤后余额约 16 USDT。用 15 USDT 保证金,
# to leave a fee buffer.  15 * 5x = 75 USDT notional.
# 留手续费缓冲。15 × 5x = 75 USDT 名义价值。
# Was 25 * 10x = 250 USDT — too much for current balance.
# 之前是 25 × 10x = 250 USDT — 对当前余额来说太大了。
target_position_usdt: 15.0

# ----- Leverage (v6 — 2026-06-27, wider SL needs lower leverage) -----
# ----- 杠杆 (v6 — 2026-06-27, 更宽的止损需要更低的杠杆) -----
# 10x → 5x.  Backtest sweep on 60d 5m data showed SL1.5%/TP3.0% at 5x was
# 10x → 5x。60 天 5 分钟回测扫描显示 SL1.5%/TP3.0% + 5x
# the only positive-expectancy config (+0.13 USDT vs -4.81 for v5).
# 是唯一正期望的配置 (+0.13 USDT, v5 是 -4.81)。
# 5x gives SL breathing room: 1.5% price move @ 5x = 7.5% margin = ~1.1 USDT.
# 5x 给止损留呼吸空间: 1.5% 价格波动 × 5x = 7.5% 保证金 ≈ 1.1 USDT。
# At 10x the same 1.5% SL = 15% margin = too much heat per trade.
# 10x 下同样 1.5% 止损 = 15% 保证金 = 每笔风险太大。
leverage: 5

# ----- Strategy: RSI Extreme Mean Reversion / 策略: RSI 极值均值回归 -----
strategy_name: rsi_extremes_5m
rsi_period: 7
# v8 — 2026-06-28:
# v8 — 2026-06-28:
# Wilder-indicator backtest (3 windows × 12 configs) proved v7's RSI 15/85
# Wilder 指标回测 (3 窗口 × 12 配置) 证明 v7 的 RSI 15/85
# was a LOSER (PF 0.61, all windows negative, -16.70 total).
# 是亏损的 (PF 0.61, 三窗口全亏, 共 -16.70)。
# RSI 20/80 is the ONLY config positive across all 3 windows:
# RSI 20/80 是唯一三窗口全正的配置:
#   A(up +15.8%): +2.36  B(down -14.8%): +8.92  C(down -16.6%): +1.61
# avgPF 1.18, 84 trades, 42% WR, SL1.5%/TP3.0% @ 5x.
# 平均 PF 1.18, 84 笔, 42% 胜率, SL1.5%/TP3.0% @ 5x。
rsi_oversold: 20.0
rsi_overbought: 80.0

# ----- K-line / Polling / K线 / 轮询 -----
kline_interval: 5m
poll_seconds: 60
warmup_bars: 210  # 200 for EMA200 + buffer / EMA200预热+缓冲
# Wait 12 x 5m bars (~1h) after any trade closes before re-entering.
# 任意交易结束后等待 12 根 5 分钟 K 线 (约 1 小时) 再入场。
# Backtest: 12/88 + 0.5/1.0 + 12-bar cooldown improved 60d replay from
# 回测: 12/88 + 0.5/1.0 + 12 根冷却将 60 天回放从 +22.60 提升到
# +22.60 to +24.90 USDT and reduced clustered RSI re-entries.
# +24.90 USDT, 并减少 RSI 反复触发导致的聚集入场。
cooldown_bars_after_trade: 12

# ----- Stop Loss / Take Profit (v6 — 2026-06-27) -----
# ----- 止损 / 止盈 (v6 — 2026-06-27) -----
# v5 0.5%/1.0% was too tight: 0.5% × 10x = 0.05% price move kills it,
# v5 的 0.5%/1.0% 太紧: 0.5% × 10x = 0.05% 价格波动就止损,
# BTC 5m noise is routinely 0.1-0.2%.  Backtest sweep showed:
# 而 BTC 5 分钟噪声通常 0.1-0.2%。回测扫描显示:
#   v5 (0.5/1.0/10x): 138 trades, 34.8% WR, -4.81 USDT
#   v5 (0.5/1.0/10x): 138 笔, 34.8% 胜率, -4.81 USDT
#   v6 (1.5/3.0/5x):   39 trades, 38.5% WR, +0.13 USDT  ← winner
#   v6 (1.5/3.0/5x):   39 笔, 38.5% 胜率, +0.13 USDT  ← 最优
# Wider SL survives noise, wider TP is actually reachable, 5x lev
# 更宽的止损能扛住噪声, 更宽的止盈实际够得着, 5x 杠杆
# keeps per-trade loss manageable at ~1.1 USDT on 15U margin.
# 让每笔亏损可控 (15U 保证金约 1.1 USDT)。
#   SL 1.5% = -7.5% margin = -1.13 USDT before fees
#   止损 1.5% = -7.5% 保证金 = -1.13 USDT (扣费前)
#   TP 3.0% = +15% margin = +2.25 USDT before fees
#   止盈 3.0% = +15% 保证金 = +2.25 USDT (扣费前)
# R:R = 1:2, breakeven WR = 33% (backtest shows 38.5%)
# 盈亏比 = 1:2, 盈亏平衡胜率 = 33% (回测 38.5%)
stop_loss_pct: 0.015
take_profit_pct: 0.030

# ----- Signal Exit (v2 new flag) / 信号退出 (v2 新增标志) -----
# When false, positions only close via SL/TP/manual — NOT on opposite RSI signal.
# 为 true 时, 仓位只通过止损/止盈/手动平仓 — 不因反向 RSI 信号平仓。
# This stops winners being closed at 0.2% profit when 1% TP is reachable.
# 这阻止了在 1% 止盈可达时, 盈利单被 0.2% 微利平掉。
disable_signal_exit: true

# ----- Risk Caps (circuit breakers) / 风控上限 (熔断器) -----
daily_loss_pct: 0.25
weekly_loss_pct: 0.40

# ----- Trend Filter (v5 — 2026-06-24) / 趋势过滤 -----
# ADX measures trend strength regardless of direction.
# ADX 衡量趋势强度, 不分方向。
# >25 = strong trend, <20 = ranging/choppy.
# >25 = 强趋势, <20 = 震荡/盘整。
# Mean-reversion (RSI extremes) loses money in trends: RSI goes oversold
# 均值回归 (RSI 极值) 在趋势中亏钱: RSI 超卖但价格继续跌。
# but price keeps falling.  When trending, bot skips new entries but
# still manages existing positions via SL/TP.
# 趋势中机器人跳过新开仓, 但仍通过止损/止盈管理已有仓位。
trend_filter_enabled: true
trend_filter_adx_threshold: 25.0

# ----- EMA Trend-Alignment Filter (v7 — 2026-06-27) / EMA 趋势对齐过滤 -----
# Only take longs when price > EMA200 (uptrend), only shorts when price < EMA200.
# 只在价格 > EMA200 时做多 (上升趋势), 只在价格 < EMA200 时做空。
# Multi-window backtest showed this dramatically improves downtrend performance
# 多窗口回测显示此过滤显著改善下跌表现
# (+8.35 / +11.85 vs -0.18 / +2.33 without) by blocking counter-trend entries.
# (+8.35 / +11.85 vs 无过滤 -0.18 / +2.33), 通过拦截逆势入场。
# Cost: worse in uptrend pullbacks (-7.14 vs -3.98) but net avg improves +4.35 vs -0.61.
# 代价: 上升回调中变差 (-7.14 vs -3.98), 但净平均从 -0.61 提升到 +4.35。
trend_ema_filter_enabled: true
trend_ema_period: 200
