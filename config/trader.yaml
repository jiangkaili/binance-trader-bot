# ============================================================
# Trading Strategy Configuration  (v2 — 2026-06-23 risk overhaul)
# ============================================================
# Rationale for v2 changes:
#   14-day backtest of original config (20x, 1% SL, signal-exit) showed
#   -40 USDT total / -2.86 USDT/day. Math was negative due to:
#     1) 20x leverage made fees eat 1.6% of margin per round trip
#     2) Signal-exit closed winners at ~0.2% (much smaller than 1% SL)
#     3) Reward/risk ratio collapsed to 0.2 — needed 83% WR to break even
#
# v2 fixes:
#   1) Leverage 20x -> 5x (fees drop to 0.4% of margin)
#   2) Drop signal-exit (handled in live_trader.py, not here) — let winners run to TP
#   3) Keep 1% TP, tighten SL to 0.5% — reward/risk now 2:1
#   4) Breakeven WR drops to 34% (we have ~50%+ in observed data)
# ----- Trading Pair -----
symbol: BTCUSDT

# ----- Position Sizing -----
# 25 USDT margin * 5x = 125 USDT notional (was 25 * 20x = 500 USDT)
# Smaller notional = less fee drag and less exposure per trade.
target_position_usdt: 25.0

# ----- Leverage (v4 — 2026-06-24, user wants higher frequency + bigger fish) -----
# 5x → 10x. Doubles per-trade P&L, dilutes the ~0.12% round-trip fee drag.
# Combined with tighter SL/TP below, expected frequency goes from ~1.7/day
# to ~4-5/day with similar risk-per-trade in USDT terms.
# 0.6% price move @ 10x = 6% margin change = ~1.5 USDT on 25 USDT margin.
leverage: 10

# ----- Strategy: RSI Extreme Mean Reversion -----
strategy_name: rsi_extremes_5m
rsi_period: 7
rsi_oversold: 20.0
rsi_overbought: 80.0

# ----- K-line / Polling -----
kline_interval: 5m
poll_seconds: 60
warmup_bars: 50

# ----- Stop Loss / Take Profit (v4 — 2026-06-24) -----
# Tightened from v3 (1.0%/1.5%) to 0.6%/0.9% to enable higher trade frequency.
# Combined with 10x leverage:
#   SL 0.6% = -6% margin = -1.50 USDT loss
#   TP 0.9% = +9% margin = +2.25 USDT win (before fees)
# Reward/risk stays 1.5:1, breakeven WR still ~40%.
# Tighter targets are hit more often → more turnover → more trades/day.
stop_loss_pct: 0.006    # was 0.010
take_profit_pct: 0.009  # was 0.015

# ----- Signal Exit (v2 new flag) -----
# When false, positions only close via SL/TP/manual — NOT on opposite RSI signal.
# This stops winners being closed at 0.2% profit when 1% TP is reachable.
disable_signal_exit: true

# ----- Risk Caps (circuit breakers) -----
daily_loss_pct: 0.25
weekly_loss_pct: 0.40

# ----- Streak Protection -----
streak_cooldown_hours: 24
streak_loss_count: 3
